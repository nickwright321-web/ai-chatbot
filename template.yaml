AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI ChatBot - WebSocket + Bedrock + ServiceNow + Genesys

#############################################################
# Run sam deploy and then run 
# aws s3 cp Bedrock/bob-training.jsonl s3://bob-training-data-<acct>-<region>/
# to upload the training data for Bob customization
#############################################################

Globals:
  Function:
    Runtime: python3.11
    Timeout: 15
    MemorySize: 256

Parameters:
  ConnectionsTableName:
    Type: String
    Default: WS_Chat_Connections

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0

  ServiceNowBaseUrl:
    Type: String
    Default: https://your-instance.service-now.com

  GenesysBaseUrl:
    Type: String
    Default: https://api.mypurecloud.com

Resources:

  ###########################################################
  # DynamoDB Table
  ###########################################################
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref ConnectionsTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

